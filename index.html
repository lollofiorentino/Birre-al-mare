<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birre al Mare</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍻</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050b14;         
            --card: #0d182b;       
            --primary: #dfb12c;    
            --primary-hover: #c49922;
            --text: #ffffff;       
            --text-muted: #b4cce0; 
            --border: #233e66;     
            --row-bg: #112038;     
            --danger: #ff6b6b;     
            --danger-hover: #e05252;
            --input-bg: #081121;   
            --success: #2bd458;    
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
        }
        h1, h2, h3 {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            text-align: center;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        p {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95em;
            line-height: 1.5;
        }
        input, select, button {
            font-family: 'Inter', sans-serif;
            padding: 12px;
            margin: 5px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--text);
            box-sizing: border-box;
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        input::placeholder, select::placeholder {
            font-family: 'Inter', sans-serif;
            color: #4a6782;
        }
        button {
            background-color: var(--primary);
            color: #050b14; 
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:active {
            transform: scale(0.98);
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }
        .flex-row input, .flex-row select {
            flex: 1;
            margin: 0;
        }
        .flex-row button {
            width: auto;
            margin: 0;
            white-space: nowrap;
        }

        /* Nuove Sezioni Setup */
        .setup-section {
            background: var(--row-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }
        .setup-section h2 {
            font-size: 1.15em;
            margin-bottom: 5px;
            color: var(--text);
            text-shadow: none;
        }
        .setup-section p {
            margin-top: 0;
            font-size: 0.85em;
            margin-bottom: 15px;
        }
        .setup-divider {
            text-align: center;
            margin: 20px 0 0 0;
            position: relative;
            z-index: 1;
        }
        .setup-divider span {
            background-color: var(--card);
            padding: 0 10px;
            color: var(--text-muted);
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .setup-divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--border);
            z-index: -1;
        }

        .recent-container {
            margin-top: 25px;
            text-align: center;
        }
        .recent-title {
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .recent-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .chip-btn {
            background-color: var(--row-bg);
            color: #ffffff;
            border: 1px solid var(--border);
            padding: 6px 12px;
            font-size: 0.85em;
            border-radius: 20px;
            margin: 0;
            font-weight: 400;
            width: auto;
        }
        .chip-btn:hover {
            background-color: var(--primary);
            color: #050b14;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--row-bg);
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .player-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-icon-delete {
            background: transparent;
            border: none;
            font-size: 1.1em;
            cursor: pointer;
            padding: 0;
            opacity: 0.6;
            transition: 0.2s;
            width: auto;
            margin: 0;
        }
        .btn-icon-delete:hover {
            opacity: 1;
            transform: scale(1.1);
            background: transparent;
        }
        .btn-circle {
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            padding: 0;
            margin: 0;
        }
        .btn-minus { 
            background-color: rgba(255, 107, 107, 0.15); 
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        .btn-minus:hover { background-color: rgba(255, 107, 107, 0.25); }
        .btn-plus { 
            background-color: rgba(223, 177, 44, 0.15); 
            color: var(--primary);
            border: 1px solid rgba(223, 177, 44, 0.3);
        }
        .btn-plus:hover { background-color: rgba(223, 177, 44, 0.25); }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-secondary:hover {
            background-color: rgba(223, 177, 44, 0.15);
            color: #ffffff;
        }
        
        .btn-save {
            background-color: var(--primary);
            color: #050b14;
            font-weight: 700;
            margin-top: 15px;
            width: 100%;
        }
        .btn-save.success {
            background-color: var(--success);
            color: #050b14;
        }
        
        .btn-delete {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
            margin-top: 25px;
            width: 100%;
        }
        .btn-delete:hover {
            background-color: rgba(255, 107, 107, 0.15);
            color: #ffffff;
        }

        .settle-area {
            background: var(--row-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .log-list {
            font-size: 0.85em;
            color: var(--text-muted);
            max-height: 130px;
            overflow-y: auto;
            background: var(--input-bg);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .log-list div {
            margin-bottom: 4px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }
        
        #gameArea {
            display: none;
        }
        
        .saldo-item {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 1.05em;
            color: var(--text);
        }
        #saldoList {
            background-color: var(--input-bg);
            border-radius: 8px;
            padding: 5px 12px;
            border: 1px solid var(--border);
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .btn-home {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 1.2em;
            padding: 0;
            width: auto;
            margin: 0;
        }
        .btn-home:hover {
            color: #ffffff;
            background: transparent;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setupArea">
        <h1 style="margin-bottom: 5px;">Birre al Mare 🍻</h1>
        
        <div class="setup-section">
            <h2>Continua a giocare</h2>
            <p>Inserisci l'ID di una partita esistente per riprendere il conteggio.</p>
            <div class="flex-row">
                <input type="text" id="joinGameId" placeholder="Es: rimini2026" onkeypress="if(event.key === 'Enter') joinExistingGame()">
                <button id="btnJoin" onclick="joinExistingGame()">Entra</button>
            </div>
        </div>

        <div class="setup-divider"><span>OPPURE</span></div>

        <div class="setup-section">
            <h2>Nuova partita</h2>
            <p>Crea un nuovo ID univoco per il tuo gruppo di amici.</p>
            <div class="flex-row">
                <input type="text" id="newGameId" placeholder="Es: ibiza_estate" onkeypress="if(event.key === 'Enter') createNewGame()">
                <button id="btnCreate" onclick="createNewGame()">Crea</button>
            </div>
        </div>
        
        <div class="recent-container" id="recentContainer" style="display: none;">
            <div class="recent-title">Ultime Partite Aggiunte</div>
            <div class="recent-chips" id="recentChips"></div>
        </div>
    </div>

    <div id="gameArea">
        <div class="header-actions">
            <button class="btn-home" onclick="goHome()">⬅️ Home</button>
            <h2 id="displayGameId" style="margin: 0; font-size: 1.3em;"></h2>
        </div>
        
        <div class="flex-row" style="margin-top: 15px;">
            <input type="text" id="newPlayerName" placeholder="Nome Giocatore" onkeypress="if(event.key === 'Enter') addPlayer()">
            <button onclick="addPlayer()">Aggiungi</button>
        </div>

        <div id="playersList" style="margin-top: 25px;"></div>

        <div class="settle-area">
            <h3 style="margin-top: 0; font-size: 1.1em;">Segna Bevuta Pagata</h3>
            <div class="flex-row">
                <select id="payerSelect">
                    <option value="">Chi paga...</option>
                </select>
                <select id="receiverSelect">
                    <option value="">A chi...</option>
                </select>
            </div>
            <button class="btn-secondary" style="width: 100%; margin-top: 10px;" onclick="settleDebt()">Conferma Bevuta 🍻</button>
        </div>

        <div id="saldoArea" style="margin-top: 25px;">
            <h3>Situazione Saldi</h3>
            <div id="saldoList"></div>
        </div>

        <button id="btnSave" class="btn-save" onclick="forceSave()">💾 SALVA PARTITA</button>

        <h3 style="margin-top: 25px; text-align: left; font-size: 1.1em;">Cronologia Modifiche</h3>
        <div class="log-list" id="logList"></div>
        
        <button id="btnDelete" class="btn-delete" onclick="deleteGame()">🗑️ ELIMINA PARTITA E CACHE</button>
    </div>
</div>

<script>
    // IL LINK OTTENUTO DA APPS SCRIPT È ORA INSERITO E FUNZIONANTE
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzmTKeWLYnucEIBs_gKHk5ep_9sd_8NVCbe9QojyRhSWeIFk6jelHW-JzyBylnPsT-I/exec"; 

    let currentGameId = "";
    let gameData = {
        players: {}, 
        logs: []
    };

    window.onload = function() {
        try {
            renderRecentChips();
        } catch(e) {
            console.log("Accesso alla memoria locale limitato.");
        }
    };

    // --- GESTIONE MEMORIA RECENTI ---
    function getRecentGames() {
        const recent = localStorage.getItem('birre_recent_ids');
        return recent ? JSON.parse(recent) : [];
    }

    function saveRecentGame(id) {
        let recent = getRecentGames();
        recent = recent.filter(item => item !== id);
        recent.unshift(id);
        if (recent.length > 5) recent.pop();
        localStorage.setItem('birre_recent_ids', JSON.stringify(recent));
    }

    function renderRecentChips() {
        const recent = getRecentGames();
        const container = document.getElementById('recentContainer');
        const chipsWrapper = document.getElementById('recentChips');
        
        if (recent.length === 0) {
            container.style.display = 'none';
            return;
        }
        
        container.style.display = 'block';
        chipsWrapper.innerHTML = recent.map(id => 
            `<button class="chip-btn" onclick="joinExistingGameDirectly('${id}')">${id}</button>`
        ).join('');
    }

    // --- VERIFICA ESISTENZA PARTITA SUL DATABASE ---
    async function checkGameExists(id) {
        if (!APP_SCRIPT_URL) {
            // Modalità Locale / Fallback
            const saved = localStorage.getItem('birre_' + id);
            if (saved) {
                const parsed = JSON.parse(saved);
                return (Object.keys(parsed.players).length > 0 || parsed.logs.length > 0);
            }
            return false;
        }

        try {
            const response = await fetch(`${APP_SCRIPT_URL}?id=${id}`);
            const data = await response.json();
            // Una partita esiste se ha giocatori registrati O ha un log di creazione/eventi
            return (Object.keys(data.players || {}).length > 0 || (data.logs && data.logs.length > 0));
        } catch (error) {
            console.error("Errore durante la verifica dell'ID:", error);
            return null; // Errore di rete
        }
    }

    // --- AZIONI SCHERMATA HOME ---
    async function joinExistingGame() {
        const id = document.getElementById('joinGameId').value.trim().toLowerCase();
        if (!id) return alert("Inserisci l'ID della partita a cui vuoi accedere.");
        
        const btn = document.getElementById('btnJoin');
        btn.innerHTML = "⏳...";
        btn.disabled = true;

        const exists = await checkGameExists(id);
        
        btn.innerHTML = "Entra";
        btn.disabled = false;

        if (exists === null) return alert("Errore di connessione col server. Riprova.");
        
        if (exists === false) {
            return alert(`Attenzione: La partita "${id}" non esiste. Controlla l'ID o creane uno nuovo in "Nuova Partita".`);
        }

        executeLoad(id);
    }

    async function joinExistingGameDirectly(id) {
        // Usato dai bottoncini rapidi (partiamo dal presupposto che esista, per velocità)
        executeLoad(id);
    }

    async function createNewGame() {
        const id = document.getElementById('newGameId').value.trim().toLowerCase();
        if (!id) return alert("Inserisci un ID per creare la tua partita.");
        if (id.length < 3) return alert("Scegli un ID di almeno 3 caratteri.");
        
        const btn = document.getElementById('btnCreate');
        btn.innerHTML = "⏳...";
        btn.disabled = true;

        const exists = await checkGameExists(id);
        
        btn.innerHTML = "Crea";
        btn.disabled = false;

        if (exists === null) return alert("Errore di connessione col server. Riprova.");
        
        if (exists === true) {
            return alert(`Impossibile creare: L'ID "${id}" è già in uso! Ti preghiamo di scegliere un altro ID.`);
        }

        // Se arriviamo qui, la partita è davvero nuova e libera
        executeLoad(id);
        
        // Salviamo immediatamente un evento per "bloccare" l'ID sul server
        gameData = { players: {}, logs: [] };
        addLog("Partita creata! 🍻");
        saveData(); 
    }

    // --- CARICAMENTO INTERFACCIA GIOCO ---
    function executeLoad(id) {
        currentGameId = id;
        saveRecentGame(id);
        
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        document.getElementById('displayGameId').innerText = "ID: " + currentGameId;
        
        // Pulizia dei campi input della home
        document.getElementById('joinGameId').value = "";
        document.getElementById('newGameId').value = "";

        fetchData();
    }

    function goHome() {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('setupArea').style.display = 'block';
        currentGameId = "";
        renderRecentChips();
    }

    // --- GESTIONE DATI SERVER ---
    async function fetchData() {
        if (!APP_SCRIPT_URL) {
            const saved = localStorage.getItem('birre_' + currentGameId);
            gameData = saved ? JSON.parse(saved) : { players: {}, logs: [] };
            renderUI();
            return;
        }

        document.getElementById('playersList').innerHTML = "<p>Caricamento dati in corso...</p>";
        try {
            const response = await fetch(`${APP_SCRIPT_URL}?id=${currentGameId}`);
            const data = await response.json();
            if (data && (data.players || data.logs)) {
                gameData = {
                    players: data.players || {},
                    logs: data.logs || []
                };
            } else {
                gameData = { players: {}, logs: [] };
            }
            renderUI();
        } catch (error) {
