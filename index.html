<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birre al Mare</title>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #151210;         /* Fondo scuro e caldo */
            --card: #221c19;       /* Colore dei blocchi principali */
            --primary: #d4a373;    /* Ambra / Oro caldo per elementi principali */
            --primary-hover: #b98a5c;
            --text: #f4f1de;       /* Testo chiaro crema */
            --text-muted: #a0938a; /* Testo secondario */
            --border: #3d322c;
            --row-bg: #2d2420;
        }
        body {
            font-family: 'Alegreya', serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
        }
        h1, h2, h3 {
            font-family: 'Alegreya', serif;
            text-align: center;
            color: var(--primary);
            letter-spacing: 0.5px;
            margin-top: 0;
        }
        p {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95em;
            line-height: 1.5;
        }
        input, button {
            font-family: 'Alegreya', serif;
            padding: 12px;
            margin: 5px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background-color: #1a1512;
            color: var(--text);
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        input::placeholder {
            font-family: 'Alegreya', serif;
            color: #6d5c54;
        }
        button {
            background-color: var(--primary);
            color: #151210;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:active {
            transform: scale(0.98);
        }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        .flex-row input {
            flex: 1;
        }
        .recent-container {
            margin-top: 20px;
            text-align: center;
        }
        .recent-title {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
