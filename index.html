<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birre al Mare</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍻</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050b14;         /* Blu notte profondo */
            --card: #0d182b;       /* Blu notte per il contenitore */
            --primary: #00d4e3;    /* Ciano brillante (Altissimo contrasto) */
            --primary-hover: #00b4c2;
            --text: #ffffff;       /* Bianco puro */
            --text-muted: #b4cce0; /* Azzurro ghiaccio chiaro */
            --border: #233e66;     /* Bordo più visibile */
            --row-bg: #112038;     /* Sfondo righe */
            --danger: #ff6b6b;     /* Rosso brillante */
            --danger-hover: #e05252;
            --input-bg: #081121;   /* Sfondo input scurissimo */
            --success: #2bd458;    /* Verde brillante */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
        }
        h1, h2, h3 {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            text-align: center;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin-top: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3); /* Leggera ombra per staccare dal fondo */
        }
        p {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95em;
            line-height: 1.5;
        }
        input, select, button {
            font-family: 'Inter', sans-serif;
            padding: 12px;
            margin: 5px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background-color: var(--input-bg);
            color: var(--text);
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        input::placeholder, select::placeholder {
            font-family: 'Inter', sans-serif;
            color: #8ba4ba; /* Placeholder più chiaro */
        }
        button {
            background-color: var(--primary);
            color: #050b14; /* Testo scuro sul bottone chiaro per massimizzare la leggibilità */
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:active {
            transform: scale(0.98);
        }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        .flex-row input, .flex-row select {
            flex: 1;
        }
        .recent-container {
            margin-top: 20px;
            text-align: center;
        }
        .recent-title {
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .recent-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .chip-btn {
            background-color: var(--row-bg);
            color: #ffffff;
            border: 1px solid var(--border);
            padding: 6px 12px;
            font-size: 0.85em;
            border-radius: 20px;
            margin: 0;
            font-weight: 400;
        }
        .chip-btn:hover {
            background-color: var(--primary);
            color: #050b14;
        }
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--row-bg);
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .btn-circle {
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
        .btn-minus { 
            background-color: rgba(255, 107, 107, 0.15); 
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }
        .btn-minus:hover { background-color: rgba(255, 107, 107, 0.25); }
        .btn-plus { 
            background-color: rgba(0, 212, 227, 0.15); 
            color: var(--primary);
            border: 1px solid rgba(0, 212, 227, 0.3);
        }
        .btn-plus:hover { background-color: rgba(0, 212, 227, 0.25); }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-secondary:hover {
            background-color: rgba(0, 212, 227, 0.15);
            color: #ffffff;
        }
        
        .btn-save {
            background-color: var(--primary);
            color: #050b14;
            font-weight: 700;
            margin-top: 15px;
            width: 100%;
        }
        .btn-save.success {
            background-color: var(--success);
            color: #050b14;
        }

        .settle-area {
            background: var(--row-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .log-list {
            font-size: 0.85em;
            color: var(--text-muted);
            max-height: 130px;
            overflow-y: auto;
            background: var(--input-bg);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .log-list div {
            margin-bottom: 4px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }
        #gameArea, #saldoArea {
            display: none;
        }
