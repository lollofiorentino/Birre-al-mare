<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birre al Mare</title>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #061a1e;         /* Sfondo color petrolio scurissimo */
            --card: #0d2c33;       /* Contenitore petrolio */
            --primary: #2bbba1;    /* Verde acqua / Teal brillante */
            --primary-hover: #20947f;
            --text: #e8f7f5;       /* Testo chiaro a contrasto */
            --text-muted: #8fbab3; /* Testo secondario */
            --border: #1c4952;
            --row-bg: #12363e;
            --danger: #e06c75;
            --danger-hover: #be555d;
        }
        body {
            font-family: 'Alegreya', serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
        }
        h1, h2, h3 {
            font-family: 'Alegreya', serif;
            text-align: center;
            color: var(--primary);
            letter-spacing: 0.5px;
            margin-top: 0;
        }
        p {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95em;
            line-height: 1.5;
        }
        input, select, button {
            font-family: 'Alegreya', serif;
            padding: 12px;
            margin: 5px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background-color: #081e23;
            color: var(--text);
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        input::placeholder, select::placeholder {
            font-family: 'Alegreya', serif;
            color: #55878d;
        }
        button {
            background-color: var(--primary);
            color: #061a1e;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:active {
            transform: scale(0.98);
        }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        .flex-row input, .flex-row select {
            flex: 1;
        }
        .recent-container {
            margin-top: 20px;
            text-align: center;
        }
        .recent-title {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .recent-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .chip-btn {
            background-color: #12363e;
            color: var(--primary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            font-size: 0.85em;
            border-radius: 20px;
            margin: 0;
        }
        .chip-btn:hover {
            background-color: var(--primary);
            color: #061a1e;
        }
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--row-bg);
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .btn-circle {
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
        .btn-minus { 
            background-color: rgba(224, 108, 117, 0.2); 
            color: var(--danger);
            border: 1px solid rgba(224, 108, 117, 0.4);
        }
        .btn-minus:hover { background-color: rgba(224, 108, 117, 0.4); }
        .btn-plus { 
            background-color: rgba(43, 187, 161, 0.2); 
            color: var(--primary);
            border: 1px solid rgba(43, 187, 161, 0.4);
        }
        .btn-plus:hover { background-color: rgba(43, 187, 161, 0.4); }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }
        .btn-secondary:hover {
            background-color: rgba(43, 187, 161, 0.1);
        }
        
        .settle-area {
            background: var(--row-bg);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .log-list {
            font-size: 0.85em;
            color: var(--text-muted);
            max-height: 130px;
            overflow-y: auto;
            background: #081e23;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .log-list div {
            margin-bottom: 4px;
            border-bottom: 1px solid #102e35;
            padding-bottom: 4px;
        }
        #gameArea, #saldoArea {
            display: none;
        }
        .saldo-item {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            font-size: 1.05em;
        }
        #saldoList {
            background-color: #081e23;
            border-radius: 8px;
            padding: 5px 12px;
            border: 1px solid var(--border);
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .btn-home {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 1.2em;
            padding: 0;
            width: auto;
        }
        .btn-home:hover {
            color: var(--text);
            background: transparent;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setupArea">
        <h1>Birre al Mare 🍻</h1>
        <p>Inserisci un ID per accedere ai conteggi condivisi o creane uno nuovo.</p>
        <div class="flex-row">
            <input type="text" id="gameIdInput" placeholder="Es: rimini2026">
            <button onclick="loadGameFromInput()">Entra</button>
        </div>
        
        <div class="recent-container" id="recentContainer" style="display: none;">
            <div class="recent-title">Partite Recenti</div>
            <div class="recent-chips" id="recentChips"></div>
        </div>
    </div>

    <div id="gameArea">
        <div class="header-actions">
            <button class="btn-home" onclick="goHome()">⬅️ Home</button>
            <h2 id="displayGameId" style="margin: 0; font-size: 1.3em;"></h2>
        </div>
        
        <div class="flex-row">
            <input type="text" id="newPlayerName" placeholder="Nome Giocatore">
            <button onclick="addPlayer()">Aggiungi</button>
        </div>

        <div id="playersList" style="margin-top: 25px;"></div>

        <!-- Sezione Bevute Pagate -->
        <div class="settle-area">
            <h3 style="margin-top: 0; font-size: 1.1em;">Segna Bevuta Pagata</h3>
            <div class="flex-row">
                <select id="payerSelect">
                    <option value="">Chi paga...</option>
                </select>
                <select id="receiverSelect">
                    <option value="">A chi...</option>
                </select>
            </div>
            <button class="btn-secondary" style="width: 100%; margin-top: 10px;" onclick="settleDebt()">Conferma Bevuta 🍻</button>
        </div>

        <button class="btn-secondary" style="width: 100%; margin-top: 20px;" onclick="toggleSaldi()">Mostra / Nascondi Saldi</button>

        <div id="saldoArea" style="margin-top: 20px;">
            <h3>Situazione Saldi</h3>
            <div id="saldoList"></div>
        </div>

        <h3 style="margin-top: 25px; text-align: left; font-size: 1.1em;">Cronologia Modifiche</h3>
        <div class="log-list" id="logList"></div>
    </div>
</div>

<script>
    let currentGameId = "";
    let gameData = {
        players: {}, 
        logs: []
    };

    window.onload = function() {
        try {
            renderRecentChips();
        } catch(e) {
            console.log("Accesso alla memoria locale limitato.");
        }
    };

    function getRecentGames() {
        const recent = localStorage.getItem('birre_recent_ids');
        return recent ? JSON.parse(recent) : [];
    }

    function saveRecentGame(id) {
        let recent = getRecentGames();
        recent = recent.filter(item => item !== id);
        recent.unshift(id);
        if (recent.length > 5) recent.pop();
        localStorage.setItem('birre_recent_ids', JSON.stringify(recent));
    }

    function renderRecentChips() {
        const recent = getRecentGames();
        const container = document.getElementById('recentContainer');
        const chipsWrapper = document.getElementById('recentChips');
        
        if (recent.length === 0) {
            container.style.display = 'none';
            return;
        }
        
        container.style.display = 'block';
        chipsWrapper.innerHTML = recent.map(id => 
            `<button class="chip-btn" onclick="loadGameDirectly('${id}')">${id}</button>`
        ).join('');
    }

    function loadGameFromInput() {
        const id = document.getElementById('gameIdInput').value.trim().toLowerCase();
        if (!id) return alert("Inserisci un ID valido");
        executeLoad(id);
    }

    function loadGameDirectly(id) {
        executeLoad(id);
    }

    function executeLoad(id) {
        currentGameId = id;
        saveRecentGame(id);
        
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        document.getElementById('displayGameId').innerText = "ID: " + currentGameId;

        fetchData();
    }

    function goHome() {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('setupArea').style.display = 'block';
        document.getElementById('gameIdInput').value = "";
        currentGameId = "";
        renderRecentChips();
    }

    function fetchData() {
        const saved = localStorage.getItem('birre_' + currentGameId);
        if (saved) {
            gameData = JSON.parse(saved);
        } else {
            gameData = { players: {}, logs: [] };
        }
        renderUI();
    }

    function saveData() {
        localStorage.setItem('birre_' + currentGameId, JSON.stringify(gameData));
        renderUI();
    }

    function addLog(message) {
        const date = new Date().toLocaleString('it-IT', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
        gameData.logs.unshift(`[${date}] ${message}`);
        if (gameData.logs.length > 40) gameData.logs.pop();
    }

    function addPlayer() {
        const nameInput = document.getElementById('newPlayerName');
        const name = nameInput.value.trim();
        if (!name) return;

        if (gameData.players[name] !== undefined) {
            return alert("Giocatore già presente!");
        }

        gameData.players[name] = 0;
        addLog(`Aggiunto giocatore: ${name}`);
        nameInput.value = "";
        saveData();
    }

    function updateScore(player, amount) {
        gameData.players[player] += amount;
        const action = amount > 0 ? "+1 birra" : "-1 birra";
        addLog(`${player}: ${action} (Totale: ${gameData.players[player]})`);
        saveData();
    }

    function settleDebt() {
        const payer = document.getElementById('payerSelect').value;
        const receiver = document.getElementById('receiverSelect').value;

        if (!payer || !receiver) return alert("Seleziona chi paga e chi riceve.");
        if (payer === receiver) return alert("Una persona non può pagare una birra a se stessa!");

        // Chi paga "dà via" una birra, quindi gli viene tolto un debito (+1 al saldo)
        // Chi riceve prende la birra, quindi gli viene scalato un credito (-1 al saldo)
        gameData.players[payer] += 1;
        gameData.players[receiver] -= 1;

        addLog(`🍻 ${payer} ha pagato una birra a ${receiver}`);
        
        // Reset delle selezioni
        document.getElementById('payerSelect').value = "";
        document.getElementById('receiverSelect').value = "";
        
        saveData();
    }

    function calcolaSaldi() {
        let debtors = [];
        let creditors = [];

        for (const [name, balance] of Object.entries(gameData.players)) {
            if (balance < 0) debtors.push({ name, amount: -balance });
            if (balance > 0) creditors.push({ name, amount: balance });
        }

        let transactions = [];
        let i = 0; 
        let j = 0; 

        while (i < debtors.length && j < creditors.length) {
            let debtor = debtors[i];
            let creditor = creditors[j];
            let amountToPay = Math.min(debtor.amount, creditor.amount);

            transactions.push(`<strong>${debtor.name}</strong> deve ${amountToPay} birra/e a <strong>${creditor.name}</strong>`);

            debtor.amount -= amountToPay;
            creditor.amount -= amountToPay;

            if (debtor.amount === 0) i++;
            if (creditor.amount === 0) j++;
        }

        return transactions;
    }

    function renderUI() {
        const list = document.getElementById('playersList');
        list.innerHTML = "";
        
        let playerOptions = `<option value="">Seleziona...</option>`;

        for (const [player, score] of Object.entries(gameData.players)) {
            list.innerHTML += `
                <div class="player-row">
                    <span style="font-size: 1.15em;"><strong>${player}</strong>: ${score}</span>
                    <div>
                        <button class="btn-circle btn-minus" onclick="updateScore('${player}', -1)">-</button>
                        <button class="btn-circle btn-plus" onclick="updateScore('${player}', 1)">+</button>
                    </div>
                </div>
            `;
            
            playerOptions += `<option value="${player}">${player}</option>`;
        }

        // Popola i menu a tendina per le bevute pagate
        document.getElementById('payerSelect').innerHTML = playerOptions;
        document.getElementById('receiverSelect').innerHTML = playerOptions;

        const saldoList = document.getElementById('saldoList');
        const transazioni = calcolaSaldi();
        if (transazioni.length === 0) {
            saldoList.innerHTML = "<p style='margin: 10px 0;'>Nessun debito in sospeso</p>";
        } else {
            saldoList.innerHTML = transazioni.map(t => `<div class="saldo-item">${t}</div>`).join('');
        }

        const logArea = document.getElementById('logList');
        logArea.innerHTML = gameData.logs.map(log => `<div>${log}</div>`).join('');
    }

    function toggleSaldi() {
        const area = document.getElementById('saldoArea');
        area.style.display = area.style.display === 'block' ? 'none' : 'block';
    }
</script>

</body>
</html>
